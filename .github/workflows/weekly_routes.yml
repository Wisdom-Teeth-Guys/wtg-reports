name: weekly_routes

# Two scheduled jobs:
#  - build:   Sunday 7:00 PM CT  (= Monday 00:00 UTC during CDT, 01:00 UTC during CST)
#             Stamps visit_week_of=<that Monday> on each territory's 50 cadence-overdue picks.
#  - audit:   Friday 5:00 PM CT  (= 22:00 UTC during CDT, 23:00 UTC during CST)
#             Compares planned vs Spotio-visited, sets falloff_flag=true on missed orgs
#             so the next Sunday's run boosts them.
#
# Cron is in UTC. CDT (Mar–Nov) is UTC-5; CST (Nov–Mar) is UTC-6. We schedule for the
# CDT offset since that's most of the year; during winter the run lands an hour earlier
# in local time, which is fine for our purposes.
#
# Manual run: Actions → weekly_routes → "Run workflow"

on:
  schedule:
    - cron: "0 0 * * 1"   # Mon 00:00 UTC  ≈ Sun 7pm CT  → build_weekly_routes --push
    - cron: "0 22 * * 5"  # Fri 22:00 UTC  ≈ Fri 5pm CT  → route_audit_report --apply-boost --push
  workflow_dispatch:
    inputs:
      job:
        description: "Which job to run manually"
        required: true
        default: build
        type: choice
        options: [build, audit]

permissions:
  contents: read

jobs:
  weekly_routes:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Write .env from secrets
        run: |
          cat > .env <<EOF
          HUBSPOT_TOKEN=${{ secrets.HUBSPOT_TOKEN }}
          SPOTIO_CLIENT_ID=${{ secrets.SPOTIO_CLIENT_ID }}
          SPOTIO_API_SECRET=${{ secrets.SPOTIO_API }}
          EOF

      - name: Decide which job to run
        id: pick
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "job=${{ inputs.job }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "0 0 * * 1" ]; then
            echo "job=build" >> $GITHUB_OUTPUT
          else
            echo "job=audit" >> $GITHUB_OUTPUT
          fi

      - name: Build weekly routes (push)
        if: steps.pick.outputs.job == 'build'
        run: |
          python3 -m route_builder.build_weekly_routes --push 2>&1 | tee /tmp/build.log

      - name: Audit last week (apply-boost + push)
        if: steps.pick.outputs.job == 'audit'
        run: |
          # last Monday = current date minus its weekday number
          LAST_MON=$(python3 -c "import datetime;d=datetime.date.today();print(d - datetime.timedelta(days=d.weekday()))")
          python3 -m route_builder.route_audit_report --week-of "$LAST_MON" --apply-boost --push 2>&1 | tee /tmp/audit.log

      - name: Upload run artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: weekly-routes-${{ steps.pick.outputs.job }}-${{ github.run_id }}
          path: |
            route_builder/output/**
            /tmp/build.log
            /tmp/audit.log
          if-no-files-found: ignore
          retention-days: 30
