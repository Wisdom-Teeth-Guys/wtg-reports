name: Dialpad CSV inspect (one-off)

on:
  workflow_dispatch:

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install requests

      - name: Inspect CSV
        env:
          DIALPAD_API_KEY: ${{ secrets.DIALPAD_API_KEY }}
        run: python -u scripts/dialpad_inspect_csv.py
