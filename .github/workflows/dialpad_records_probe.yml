name: Dialpad records probe

on:
  workflow_dispatch:

jobs:
  records:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install requests
      - env: { DIALPAD_API_KEY: "${{ secrets.DIALPAD_API_KEY }}" }
        run: python -u scripts/dialpad_records_probe.py
