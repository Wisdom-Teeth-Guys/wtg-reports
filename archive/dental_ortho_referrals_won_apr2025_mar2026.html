let sort = { col: -1 /* total */, dir: "desc" };

function unique(arr) { return [...new Set(arr)].sort(); }

function populateFilter(id, values) {
  const sel = document.getElementById(id);
  values.forEach(v => {
    const o = document.createElement("option"); o.value = v; o.textContent = v;
    sel.appendChild(o);
  });
  sel.addEventListener("change", render);
}

function getFilters() {
  return {
    market: document.getElementById("f-market").value,
    territory: document.getElementById("f-territory").value,
  };
}

function resetFilters() {
  ["f-market","f-territory"].forEach(id => document.getElementById(id).value = "");
  document.getElementById("f-min").value = "5";
  document.getElementById("f-search").value = "";
  render();
}

function filterRows(rows, f) {
  return rows.filter(r =>
    (!f.market || r[0] === f.market) &&
    (!f.territory || r[1] === f.territory)
  );
}

function render() {
  const f = getFilters();
  // territory dropdown narrows by market
  const tSel = document.getElementById("f-territory");
  const cur = tSel.value;
  const tOpts = unique(DATA.filter(r => !f.market || r[0] === f.market).map(r => r[1]));
  tSel.innerHTML = '<option value="">All territories</option>';
  tOpts.forEach(v => { const o = document.createElement("option"); o.value=v; o.textContent=v; tSel.appendChild(o); });
  if (tOpts.includes(cur)) tSel.value = cur;
  const filters = getFilters();

  const rows = filterRows(DATA, filters);

  // overview stats — exclude unknown offices from the headline numbers
  const knownRows = rows.filter(r => r[2] !== "(unknown)");
  const insCounts = {}; INS.forEach(i => insCounts[i] = 0);
  const officeSet = new Set();
  knownRows.forEach(r => { insCounts[r[3]] = (insCounts[r[3]]||0) + 1; officeSet.add(r[2]); });
  document.getElementById("s-deals").textContent = knownRows.length.toLocaleString();
  document.getElementById("s-offices").textContent = officeSet.size.toLocaleString();
  document.getElementById("s-ppo").textContent = (insCounts["PPO"]||0).toLocaleString();
  document.getElementById("s-selfpay").textContent = (insCounts["Self Pay"]||0).toLocaleString();
  document.getElementById("s-hmo").textContent = (insCounts["HMO"]||0).toLocaleString();
  document.getElementById("s-medicaid").textContent = (insCounts["Medicaid"]||0).toLocaleString();
  document.getElementById("s-chip").textContent = (insCounts["CHIP"]||0).toLocaleString();
  document.getElementById("s-unset").textContent = (insCounts["(not set)"]||0).toLocaleString();

  // table head — always show all insurance type columns
  const cols = INS;
  const head = document.getElementById("head-row");
  head.innerHTML = "";
  const headers = ["Referring Office", ...cols, "Total", "Cum %"];
  // sortable columns: 0..Total (skip Cum %, which derives from sort order)
  const TOTAL_IDX = 1 + cols.length; // index of Total
  headers.forEach((h, i) => {
    const th = document.createElement("th");
    th.textContent = h;
    th.dataset.col = i;
    if (i === TOTAL_IDX + 1) th.style.cursor = "default"; // Cum % not sortable
    if (i === (sort.col === -1 ? TOTAL_IDX : sort.col)) {
      th.classList.add(sort.dir === "asc" ? "sorted-asc" : "sorted-desc");
    }
    th.onclick = () => {
      if (i === TOTAL_IDX + 1) return; // can't sort Cum %
      const col = parseInt(th.dataset.col);
      if (sort.col === col) sort.dir = sort.dir === "asc" ? "desc" : "asc";
      else { sort.col = col; sort.dir = (col === 0 ? "asc" : "desc"); }
      render();
    };
    head.appendChild(th);
  });

  // aggregate by office
  const officeAgg = {};
  rows.forEach(r => {
    const o = r[2];
    if (!officeAgg[o]) { officeAgg[o] = {}; cols.forEach(c => officeAgg[o][c] = 0); officeAgg[o]._total = 0; }
    officeAgg[o][r[3]] = (officeAgg[o][r[3]] || 0) + 1;

  delete officeAgg["(unknown)"];
  let arr = Object.entries(officeAgg).map(([o, v]) => [o, ...cols.map(c => v[c]||0), v._total]);

  // apply min-referrals + search filters (after building, since they apply to office aggregates)
  const minN = parseInt(document.getElementById("f-min").value) || 0;
  const search = document.getElementById("f-search").value.trim().toLowerCase();
  let totalOfficesBeforeMin = arr.length;
  arr = arr.filter(row => row[row.length-1] >= minN && (!search || row[0].toLowerCase().includes(search)));

  // sort
  let sortIdx = sort.col === -1 ? arr[0]?.length - 1 : sort.col;
  if (sortIdx === undefined) sortIdx = arr[0]?.length - 1 || 0;
  arr.sort((a, b) => {
    const av = a[sortIdx], bv = b[sortIdx];
    if (typeof av === "string") return sort.dir === "asc" ? av.localeCompare(bv) : bv.localeCompare(av);
    return sort.dir === "asc" ? av - bv : bv - av;
  });

  // body rows — append cumulative % column
  const tb = document.getElementById("body-rows");
  tb.innerHTML = "";
  const grandTotal = arr.reduce((s, r) => s + r[r.length-1], 0);
  let running = 0;
  arr.forEach(row => {
    const tr = document.createElement("tr");
    row.forEach((v, i) => {
      const td = document.createElement("td");
      if (i === 0) td.textContent = v;
      else { td.classList.add("num"); td.textContent = v ? v.toLocaleString() : ""; if (!v) td.classList.add("empty"); }
      tr.appendChild(td);
    });
    // Cum %
    running += row[row.length-1];
    const cumPct = grandTotal ? (running / grandTotal * 100) : 0;
    const tdCum = document.createElement("td");
    tdCum.classList.add("num");
    tdCum.textContent = cumPct.toFixed(1) + "%";
    tdCum.style.color = "#0a4d8c";
    tdCum.style.fontWeight = "500";
    tr.appendChild(tdCum);
    tb.appendChild(tr);
  });

  // totals row (excludes unknown)
  const knownTotals = {}; cols.forEach(c => knownTotals[c] = 0);
  let knownTotal = 0;
  arr.forEach(row => { cols.forEach((c, i) => knownTotals[c] += row[i+1]); knownTotal += row[row.length-1]; });
  const totalsRow = document.getElementById("totals-row");
  totalsRow.innerHTML = "";
  const tdL = document.createElement("td"); tdL.textContent = `TOTAL (${arr.length.toLocaleString()} offices)`; totalsRow.appendChild(tdL);
  cols.forEach(c => { const td = document.createElement("td"); td.classList.add("num"); td.textContent = (knownTotals[c]||0).toLocaleString(); totalsRow.appendChild(td); });
  const tdT = document.createElement("td"); tdT.classList.add("num"); tdT.textContent = knownTotal.toLocaleString(); totalsRow.appendChild(tdT);
  const tdCumT = document.createElement("td"); tdCumT.classList.add("num"); tdCumT.textContent = "100.0%"; totalsRow.appendChild(tdCumT);

  // unknown summary at bottom
  const unkEl = document.getElementById("unknown-summary");
  if (unknownAgg && unknownAgg._total > 0) {
    const parts = cols.filter(c => unknownAgg[c]).map(c => `${c}: ${unknownAgg[c].toLocaleString()}`);
    unkEl.textContent = `${unknownAgg._total.toLocaleString()} deals — ` + parts.join(" · ");
    document.getElementById("unknown-section").style.display = "";
  } else {
    document.getElementById("unknown-section").style.display = "none";
  }

  // chart — also excludes unknown
  const monthCounts = {};
  MONTHS.forEach(m => monthCounts[m] = 0);
  knownRows.forEach(r => { if (r[4] in monthCounts) monthCounts[r[4]]++; });
  const labels = MONTHS.map(m => {
    const [y, mo] = m.split("-");
    return new Date(y, mo-1, 1).toLocaleString("en", {month:"short", year:"2-digit"});
  });
  const data = MONTHS.map(m => monthCounts[m]);
  if (chart) chart.destroy();
  chart = new Chart(document.getElementById("growth-chart"), {
    type: "line",
    data: { labels, datasets: [{ label:"Deals", data, borderColor:"#0a4d8c", backgroundColor:"rgba(10,77,140,0.1)", tension:0.3, fill:true, pointRadius:3 }] },
    options: { responsive:true, plugins:{legend:{display:false}}, scales:{y:{beginAtZero:true,ticks:{precision:0}}} }
  });
}

// init
populateFilter("f-market", MARKET_ORDER);
populateFilter("f-territory", unique(DATA.map(r => r[1])));
document.getElementById("f-min").addEventListener("change", render);
document.getElementById("f-search").addEventListener("input", render);
document.getElementById("meta").textContent = `Apr 1, 2025 — Mar 31, 2026 · Lead source: Dentist or Orthodontist Referral · ${DATA.length.toLocaleString()} total deals · Generated ${new Date().toLocaleDateString()}`;
render();
</script>
</body></html>
