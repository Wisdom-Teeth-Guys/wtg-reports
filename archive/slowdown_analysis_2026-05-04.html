<script>
  const md = "# Surgery Slowdown Analysis \u2014 May 4, 2026\n## Cross-referencing Pipeline Action (deal flow) and Deal Won Time (closed surgeries)\n\n### Data sources & terminology\n\nTo keep the metrics unambiguous, this analysis uses two strict conventions throughout:\n\n| Metric | Source file | Date filter |\n|---|---|---|\n| **Wins / surgeries / \"won\"** | `deal won dash 5.4.26.xlsx` (Deal Won Time Dashboard data) | `Deal - Won time` (the date the deal closed) |\n| **Created deals / \"creation\" / deal flow** | `pipeline action dash 5.4.26.xlsx` (Pipeline Action Dashboard data) | `Deal - Deal created on` |\n\nSo \"Wk 18 wins = 163\" means **163 deals were won (closed) during Wk 18**, regardless of when they were created. \"Wk 18 created = 491\" means **491 deals were created during Wk 18**, regardless of their current status. The two never share a row in source data; tables that compare them side-by-side are stitched together at the aggregate (week / territory) level.\n\nThe cohort time-to-close analysis in \u00a71 is the only place the two files are joined per-deal \u2014 by (Pipeline + Marketer + Organization, ordinal date), to compute days-from-creation-to-win for individual deals.\n\n**TL;DR:**\nAcross **Wks 2-17** (the comparable window in both years), creation is **+2.4% YoY** (8,039 vs 7,851) and wins are **+5.7% YoY** (3,020 vs 2,856). The story isn't a company-wide slowdown \u2014 it's an uneven distribution. **Utah is surging** (+54% wins), **Houston NW is the standout sub-territory** (+51%), while **PHX (\u22127.8%)** and three sub-territories (**East Valley AZ, Houston NE, Dallas SE**) are dragging. Time-to-close has actually improved across most territories. The fix is sub-territory-specific.\n\n---\n\n## 1. Time-to-close per territory\n\nFor each territory, comparing the **Wks 2-9 creation cohort** (deals had \u22658 weeks of close-window in both years \u2014 apples-to-apples). 19,127 created deals were matched across both files (Pipeline + Marketer + Organization + ordinal date) to compute days-from-creation-to-win at the deal level.\n\n| Territory | n25 | Median 2025 | 60-day conv 2025 | n26 | Median 2026 | 60-day conv 2026 | \u0394 median | \u0394 60d conv |\n|---|---:|---:|---:|---:|---:|---:|---:|---:|\n| Austin | 266 | 33.5 d | 27.4% | 292 | 27.0 d | 32.9% | **\u22126.5 d** | **+5.4 pp** |\n| Dallas NE | 154 | 36.0 d | 46.1% | 159 | 16.0 d | 44.0% | **\u221220.0 d** | \u22122.1 pp |\n| Dallas NW | 301 | 28.0 d | 26.9% | 272 | 22.0 d | 39.3% | **\u22126.0 d** | **+12.4 pp** |\n| Dallas SE | 254 | 34.0 d | 33.9% | 189 | 27.0 d | 34.4% | \u22127.0 d | +0.5 pp |\n| Dallas SW | 287 | 35.0 d | 38.7% | 322 | 23.0 d | 36.0% | **\u221212.0 d** | \u22122.7 pp |\n| Houston NE | 236 | 38.0 d | 29.7% | 200 | 21.0 d | 30.5% | **\u221217.0 d** | +0.8 pp |\n| Houston NW | 172 | 28.0 d | 32.0% | 208 | 21.0 d | 31.2% | \u22127.0 d | \u22120.7 pp |\n| **Houston SE** | 244 | 36.0 d | 29.9% | 280 | 25.0 d | **23.6%** | \u221211.0 d | **\u22126.3 pp** \ud83d\udd34 |\n| Houston SW | 228 | 36.0 d | 27.2% | 293 | 27.0 d | 29.0% | \u22129.0 d | +1.8 pp |\n| **Phoenix** | 408 | 35.0 d | 25.2% | 427 | 29.0 d | **22.2%** | \u22126.0 d | **\u22123.0 pp** \ud83d\udfe1 |\n| **East Valley - AZ** | 289 | 35.0 d | 29.1% | 283 | 22.0 d | 27.9% | **\u221213.0 d** | \u22121.2 pp |\n| Tucson | 67 | 42.0 d | 6.0% | 61 | 43.0 d | 4.9% | +1.0 d | \u22121.1 pp |\n| San Antonio | 304 | 34.0 d | 31.9% | 387 | 25.0 d | 32.3% | \u22129.0 d | +0.4 pp |\n| **Utah North** | 131 | 15.0 d | **61.1%** | 171 | 20.0 d | 53.2% | +5.0 d | **\u22127.9 pp** \ud83d\udfe1 |\n| Utah South | 152 | 18.0 d | 51.3% | 247 | 22.0 d | 51.4% | +4.0 d | +0.1 pp |\n\n### What stands out\n\n**Time-to-close is shorter in 2026 in 13 of 15 territories** \u2014 Dallas NE went from 36 days to 16 (\u221220 days), Houston NE from 38 to 21 (\u221217), East Valley from 35 to 22 (\u221213), Dallas SW from 35 to 23 (\u221212). The funnel is moving faster, not slower.\n\n**The exceptions:** Utah's two territories show medians slightly *up* (+4-5 days) \u2014 but they were already the fastest in the company (15-18 day medians vs everyone else's 28-42), so even at +4 days they're still the company's fastest.\n\n**Conversion rate within 60 days is the cleaner read** for performance:\n- \ud83d\udfe2 **Best improvement:** Dallas NW (+12.4 pp, 27% \u2192 39%) and Austin (+5.4 pp). Whatever's working at the office level in these territories should be studied.\n- \ud83d\udd34 **Material slip:** Houston SE (\u22126.3 pp, 30% \u2192 24%) \u2014 its Wks 2-17 wins are now down \u22126.3% so this conversion drop is starting to surface. Worth flagging now before it gets worse.\n- \ud83d\udfe1 **Watch:** Phoenix proper (\u22123.0 pp) and Utah North (\u22127.9 pp from a high base).\n- **East Valley conversion is roughly flat (\u22121.2 pp).** The territory's wins shortfall is *not* explained by 60-day-cohort conversion \u2014 it must be downstream (operations capacity, scheduling, no-shows). See \u00a73 for the deeper read.\n\n**Tucson is a special case** \u2014 6% conversion within 60 days vs every other territory at 22-61%. Volume is low (61 deals) but the conversion gap is structural, not noise. Either the relationship there has fundamentally different dynamics or it's being deprioritized operationally.\n\n---\n\n## 2. Where it's actually breaking \u2014 by market\n\n### Wins by Deal Won Time, Wks 2-17 (2026 vs 2025)\n\n| Market | 2026 | 2025 | YoY | Trend |\n|---|---:|---:|---:|---|\n| UT | 430 | 300 | **+43.3%** | \ud83d\udfe2 surging |\n| AUS | 248 | 227 | **+9.3%** | \ud83d\udfe2 healthy |\n| SA | 279 | 258 | **+8.1%** | \ud83d\udfe2 strong |\n| HOU | 693 | 653 | **+6.1%** | \ud83d\udfe2 healthy |\n| DAL | 828 | 830 | **\u22120.2%** | \ud83d\udfe1 flat |\n| **PHX** | **542** | **588** | **\u22127.8%** | \ud83d\udd34 declining |\n\n### Deal Creation, Wks 2-17 (2026 vs 2025)\n\n| Market | 2026 | 2025 | YoY | Notes |\n|---|---:|---:|---:|---|\n| UT | 790 | 564 | **+40.1%** | matches wins surge |\n| AUS | 705 | 613 | +15.0% | |\n| HOU | 2,070 | 1,988 | +4.1% | |\n| SA | 730 | 694 | +5.2% | |\n| PHX | 1,680 | 1,667 | +0.8% | wins down despite creation flat \u2192 conversion issue |\n| **DAL** | **2,064** | **2,325** | **\u221211.2%** | \ud83d\udd34 biggest drop |\n\n### What this tells us\n\n**Phoenix is the true performance issue.** Creation flat (+0.8%) but wins down \u22127.8%. The conversion drift (see \u00a71) traces specifically to East Valley and Tucson \u2014 see \u00a73 for the sub-market decomposition.\n\n**Dallas is a creation issue, not a conversion issue.** Creation down \u221211.2% (the biggest YoY drop of any market) but wins flat (\u22120.2%) \u2014 saved largely by better conversion in Dallas NW (+12.4 pp 60-day rate). Dallas marketers are working their reduced pipeline harder. But if creation keeps slipping, wins will follow.\n\n**The other four markets are growing.** Utah is up +43% wins on +40% creation \u2014 that's the surge keeping the company-wide number positive.\n\n---\n\n## 3. Territory-level breakdown (the real story is sub-market)\n\nMarkets average across very different sub-territories. Slicing by ZIP-derived territory shows performance is far more uneven than the market view suggests \u2014 Houston has both the best and one of the worst territories in the company; the Phoenix market drag is entirely sub-market specific.\n\n### Wks 2-17 by territory, sorted by Win YoY%\n\n| Territory | Created 26 | Created 25 | Created YoY | Won 26 | Won 25 | Won YoY |\n|---|---:|---:|---:|---:|---:|---:|\n| **Utah South** | 459 | 282 | +62.8% | 242 | 157 | **+54.1%** \ud83d\udfe2 |\n| **Houston NW** | 468 | 358 | +30.7% | 171 | 113 | **+51.3%** \ud83d\udfe2 |\n| Houston SW | 549 | 465 | +18.1% | 186 | 149 | +24.8% \ud83d\udfe2 |\n| **Utah North** | 306 | 246 | +24.4% | 173 | 140 | **+23.6%** \ud83d\udfe2 |\n| Dallas SW | 701 | 647 | +8.3% | 299 | 258 | +15.9% \ud83d\udfe2 |\n| Austin | 620 | 555 | +11.7% | 241 | 220 | +9.5% \ud83d\udfe2 |\n| San Antonio | 701 | 645 | +8.7% | 278 | 258 | +7.8% \ud83d\udfe2 |\n| Dallas NE | 324 | 301 | +7.6% | 133 | 130 | +2.3% \ud83d\udfe1 |\n| Dallas NW | 488 | 662 | **\u221226.3%** | 230 | 226 | +1.8% \ud83d\udfe1 |\n| Phoenix (proper) | 850 | 853 | \u22120.4% | 308 | 304 | +1.3% \ud83d\udfe1 |\n| Houston SE | 557 | 531 | +4.9% | 179 | 191 | **\u22126.3%** \ud83d\udfe1 |\n| **East Valley - AZ** | 559 | 536 | +4.3% | 208 | 256 | **\u221218.8%** \ud83d\udd34 |\n| **Dallas SE** | 440 | 484 | \u22129.1% | 161 | 200 | **\u221219.5%** \ud83d\udd34 |\n| **Houston NE** | 359 | 497 | **\u221227.8%** | 149 | 199 | **\u221225.1%** \ud83d\udd34 |\n| Tucson | 120 | 123 | \u22122.4% | 3 | 7 | \u221257.1% (small base) |\n\n(Excluded: Unassigned territories \u2014 those are mostly missing-ZIP deals.)\n\n### Top performers \u2014 what's working\n\n1. **Utah South (+54.1% wins)** and **Utah North (+23.6%)** \u2014 both surging on real creation growth (+63% and +24%). The Utah expansion is the single biggest reason the company-wide number is still positive Wks 2-17. If you took Utah out, total wins would be roughly flat.\n2. **Houston NW (+51.3% wins on +31% creation)** \u2014 the standout sub-territory in Houston. Whatever's working here is *not* working in Houston NE \u2014 same market, opposite trajectory.\n3. **Houston SW (+25%) and Dallas SW (+16%)** \u2014 solid growth, healthy pipeline.\n\n### Underperformers \u2014 where the leak is\n\n1. **Houston NE (\u221225.1% wins on \u221227.8% creation)** \u2014 pipeline is collapsing here. Lost almost 28% of new deals Wks 2-17, and wins followed. Look at marketer coverage and territory ownership \u2014 possibly a staffing change or rep gap.\n2. **Dallas SE (\u221219.5% wins on \u22129.1% creation)** \u2014 both top-of-funnel and conversion sliding. Different from the Dallas-overall narrative; this sub-territory is genuinely struggling while the rest of Dallas is fine.\n3. **East Valley - AZ (\u221218.8% wins on +4.3% creation)** \u2014 same or *more* lead flow as last year, but ~1-in-5 fewer turning into surgeries. Pure execution/conversion drop, not a top-of-funnel issue. The \u00a71 60-day cohort conversion is roughly flat, suggesting the wins shortfall is downstream of the standard conversion window \u2014 operations capacity, scheduling, no-shows. Worth a deep dive.\n4. **Dallas NW** \u2014 wins still +1.8% but **creation has fallen \u221226.3%.** Conversion is heroic right now (+12.4 pp 60-day rate) but can't sustain on a shrinking pipeline. This is the single biggest creation drop in absolute terms (174 fewer deals Wks 2-17 vs 2025).\n5. **Houston SE** \u2014 wins now down \u22126.3% on healthy creation (+4.9%). The 60-day conversion drop (\u00a71) is the cleanest explanation \u2014 \u22126.3 pp slip means more deals creating than closing in this window. Watch: this is the most likely territory to flip from \"watch\" to \"underperformer\" in coming weeks.\n\n### Phoenix market story, decomposed\n\nThe PHX market \u22127.8% Wks 2-17 wins masks three very different sub-territories:\n\n| Sub-territory | Created YoY | Won YoY |\n|---|---:|---:|\n| Phoenix proper | \u22120.4% | +1.3% |\n| East Valley - AZ | +4.3% | \u221218.8% |\n| Tucson | \u22122.4% | \u221257.1% (3 wins) |\n\nPhoenix proper is fine. The market problem is **East Valley** (and Tucson, but Tucson's volume is too small to matter operationally \u2014 only 3 wins Wks 2-17, possibly being phased out).\n\n### Per-territory weekly deals created (Wks 2-17, full detail)\n\n#### 2026 \u2014 deals created by ISO week\n\n| Territory | Wk 2 | Wk 3 | Wk 4 | Wk 5 | Wk 6 | Wk 7 | Wk 8 | Wk 9 | Wk 10 | Wk 11 | Wk 12 | Wk 13 | Wk 14 | Wk 15 | Wk 16 | Wk 17 | **Total** |\n|---|---:|---:|---:|---:|---:|---:|---:|---:|---:|---:|---:|---:|---:|---:|---:|---:|---:|\n| Austin | 34 | 37 | 44 | 23 | 37 | 33 | 37 | 47 | 47 | 50 | 33 | 30 | 41 | 45 | 50 | 32 | **620** |\n| Dallas NE | 22 | 16 | 19 | 4 | 20 | 26 | 27 | 25 50% | +42% |\n| Houston NW | +41% | +114% |\n| Houston SW | +13% | +44% |\n| Austin | +22% | +32% |\n\n---\n\n## 4. So what's actually causing the perceived slowdown?\n\nIt's not a company-wide slowdown \u2014 Wks 2-17 wins are +5.7% YoY. The drag is concentrated in a few specific sub-territories and a few specific accounts:\n\n- **Three sub-territories carrying most of the wins shortfall:** Houston NE (\u221225.1%), Dallas SE (\u221219.5%), East Valley - AZ (\u221218.8%).\n- **One sub-territory hiding a creation problem:** Dallas NW (creation \u221226.3%, wins still +1.8% \u2014 propped up by an unusually strong +12.4 pp 60-day conversion improvement that's unlikely to last).\n- **A handful of accounts going silent:** Apple Dentistry (Dallas NW), Aqua Dental - Duncanville (Dallas SE), Irving Family Dentistry (Dallas NW), Richardson General & Cosmetic (Dallas SE) \u2014 together \u2212226 created deals Wks 2-17.\n- **One territory with a downstream-of-creation problem:** East Valley - AZ \u2014 creation +4.3% but wins \u221218.8%. The standard 60-day cohort conversion is roughly flat (\u00a71), so the shortfall is happening *after* the typical close window \u2014 likely scheduling/operations/no-shows.\n\nTime-to-close is NOT degrading \u2014 most territories are closing faster than 2025, several materially so (\u00a71).\n\n---\n\n## 5. Recommended actions\n\nNow that we can slice by sub-territory, the actions are more targeted than the market-level view suggested:\n\n1. **East Valley - AZ \u2014 top priority.** Same or more lead flow as 2025, ~19% fewer surgeries. The 60-day cohort conversion is flat, so the shortfall is downstream \u2014 operations capacity, scheduling, no-shows, or a longer-tail conversion lag. Audit operations/scheduling/staffing changes between 2025 and 2026 in this territory specifically. Highest-leverage fix in the company.\n2. **Houston NE \u2014 staffing/coverage check.** \u221227.8% creation and \u221225.1% wins Wks 2-17, with deterioration accelerating in recent weeks (\u221253% creation Wks 14-17). Likely a marketer or territory-coverage gap. Compare to Houston NW (next door, +51% wins) \u2014 find out what one is doing that the other isn't.\n3. **Dallas NW \u2014 creation push, urgent.** Wins look fine (+1.8%) but creation has fallen 26% (174 deals) and conversion is currently propped up at +12.4 pp above 2025 \u2014 that gain is unlikely to sustain. Whatever pulled creation down here (lost referral source? marketer turnover?) needs identifying before wins follow.\n4. **Dallas SE \u2014 both ends bleeding.** \u22129.1% creation and \u221219.5% wins. Two accounts (Aqua Dental + Richardson General & Cosmetic) drove 118 of the 44-deal net creation drop \u2014 the rest of the territory is offsetting in part. This is the most concentrated, highest-leverage account-level fix.\n5. **Houston SE \u2014 early warning.** Wins are now \u22126.3% on healthy creation. The 60-day cohort conversion dropped 6.3 pp (\u00a71). It hasn't tripped into the underperformer category yet but it's the most likely candidate to do so next.\n6. **Replicate Utah, Houston NW, Dallas NW conversion.** All three are operating well above 2025 in different ways: Utah on raw growth, Houston NW on balanced creation + conversion, Dallas NW on conversion alone. Study the playbook for each and copy into the underperformers.\n7. **Watch Wks 19-20 win volume.** Creation has been recovering in recent weeks. If the typical 2-3 week lag from creation to win holds, wins should follow.\n\n### Account-level priorities (highest leverage)\n\nThese four accounts represent **226 lost deal-creations Wks 2-17** vs 2025 \u2014 more than the entire net creation drops in Dallas NE, Dallas SE, and East Valley combined. Recover these and the company-wide trajectory changes immediately:\n\n| Account | Territory | Owner | Wks 2-17 lost (created) | Action |\n|---|---|---|---:|---|\n| **Apple Dentistry** | Dallas NW | check Pipedrive | \u221270 | Site visit, find out if the relationship closed |\n| **Aqua Dental - Duncanville** | Dallas SE | check Pipedrive | \u221270 | Same \u2014 went 70 \u2192 0 created deals YoY |\n| **Irving Family Dentistry** | Dallas NW | check Pipedrive | \u221243 | Still some flow (12 created in 2026) \u2014 relationship cooling, not dead |\n| **Richardson General & Cosmetic** | Dallas SE | check Pipedrive | \u221243 (+21 in dup record) | Likely needs Pipedrive dedup too |\n\nPlus second-tier: Lovett Dental - Buffalo (Houston SW, \u221233), Family Smiles of Burleson (Dallas SW, \u221227), Anna Dental (Dallas NE, \u221222), Risas Dental Chandler (East Valley, \u221221). All numbers refer to Wks 2-17 creation drops vs 2025.\n\n---\n\n*Analysis methodology:* All YoY figures use **ISO Weeks 2-17** in both 2025 and 2026 (apples-to-apples comparable window; week 1 excluded because of partial-week and holiday effects). Time-to-close cohorts (\u00a71) restricted to deals created in Wks 2-9 so both years had \u22658 weeks of close-window. 19,127 deals were matched across the two exports by (Market, Marketer, Organization, ordinal date) for the deal-level time-to-close measurement. 2026 data as of May 4, 2026.\n";
